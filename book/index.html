<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Книжный клуб</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Шапка -->
    <header>
      <h1>📚 Книжный клуб</h1>
      <div id="auth-header">
        <span id="user-greeting"></span>
        <button id="logout-btn" style="display:none;">Выйти</button>
      </div>
    </header>

    <!-- Авторизация -->
    <section id="auth-section">
      <div id="login-form">
        <h2>Вход в клуб</h2>
        <input type="text" id="login-username" placeholder="Имя пользователя">
        <input type="password" id="login-password" placeholder="Пароль">
        <button id="login-btn">Войти</button>
        <p>Нет аккаунта? <a href="#" id="show-register">Зарегистрироваться</a></p>
      </div>

      <div id="register-form" style="display:none;">
        <h2>Регистрация</h2>
        <input type="text" id="reg-username" placeholder="Имя пользователя">
        <input type="password" id="reg-password" placeholder="Пароль">
        <button id="register-btn">Зарегистрироваться</button>
        <p>Уже есть аккаунт? <a href="#" id="show-login">Войти</a></p>
      </div>
    </section>

    <!-- Основной контент -->
    <section id="main-content" style="display:none;">
      <!-- Статистика -->
      <div id="stats">
        <div class="stat-card">
          <span class="stat-number" id="total-books">0</span>
          <span class="stat-label">Всего книг</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="avg-rating">0</span>
          <span class="stat-label">Средний рейтинг</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="favorite-genre">-</span>
          <span class="stat-label">Любимый жанр</span>
        </div>
      </div>

      <!-- Форма добавления книги -->
      <div id="book-form">
        <h3>➕ Добавить книгу</h3>
        <input type="text" id="book-title" placeholder="Название книги">
        <input type="text" id="book-author" placeholder="Автор">
        <select id="book-genre">
          <option value="Фантастика">Фантастика</option>
          <option value="Детектив">Детектив</option>
          <option value="Роман">Роман</option>
          <option value="Научная литература">Научная литература</option>
          <option value="Поэзия">Поэзия</option>
          <option value="Другое">Другое</option>
        </select>
        <div id="rating-select">
          <span>Оценка: </span>
          <select id="book-rating">
            <option value="5">⭐ 5</option>
            <option value="4">⭐ 4</option>
            <option value="3" selected>⭐ 3</option>
            <option value="2">⭐ 2</option>
            <option value="1">⭐ 1</option>
          </select>
        </div>
        <textarea id="book-review" placeholder="Ваша рецензия..."></textarea>
        <button id="add-book-btn">Добавить книгу</button>
      </div>

      <!-- Фильтры -->
      <div id="filter-section">
        <input type="text" id="search-book" placeholder="🔍 Поиск по названию или автору">
        <select id="filter-genre">
          <option value="all">Все жанры</option>
          <option value="Фантастика">Фантастика</option>
          <option value="Детектив">Детектив</option>
          <option value="Роман">Роман</option>
          <option value="Научная литература">Научная литература</option>
          <option value="Поэзия">Поэзия</option>
          <option value="Другое">Другое</option>
        </select>
        <button id="filter-btn">Применить</button>
        <button id="reset-filter-btn">Сбросить</button>
      </div>

      <!-- Список книг -->
      <div id="books-list"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
